slug: accuranker
name: AccuRanker
group: AccuRanker
website: https://www.accuranker.com/
description: LLM prompt tracking inside AccuRanker with KPI, source, and competitor reporting.
plans:
  - name: Custom
    slug: custom
    price:
      amount: null
      currency: USD
      period: monthly
      note: null
    includedLlmModels: 4
    llmSupport:
      chatgpt: true
      gemini: false
      perplexity: true
      claude: false
      llama: false
      grok: false
      aiOverviews: true
      aiMode: true
metricDefinitions:
  - slug: prompts
    name: Prompts
    summary: Number of prompts currently tracked in AccuLLM.
    description: Displayed as a dashboard KPI for the active filters and date range.
    aliases: []
    sourceUrls:
      - https://www.accuranker.com/help/getting-started/accullm/
    screenshotIds:
      - accullm-kpis-dashboard
    status: live
    lastUpdated: 2026-03-05
  - slug: visibility
    name: Visibility
    summary: Average visibility score based on how often the brand and domain are mentioned in prompt responses.
    description: At the engine level visibility is binary, and aggregate views average that visibility across the selected engines.
    aliases: []
    sourceUrls:
      - https://www.accuranker.com/help/getting-started/accullm/
      - https://www.accuranker.com/help/getting-started/llm-metrics-and-advanced-concepts/
    screenshotIds:
      - accullm-kpis-dashboard
      - accullm-visibility-widget
    status: live
    lastUpdated: 2026-03-05
  - slug: sentiment
    name: Sentiment
    summary: Average sentiment score from 1 to 100 for how favorably the LLM talks about the brand.
    description: AccuLLM analyzes the brand mention plus surrounding context and combines the relevant snippets into one prompt-level score.
    aliases: []
    sourceUrls:
      - https://www.accuranker.com/help/getting-started/accullm/
      - https://www.accuranker.com/help/getting-started/llm-metrics-and-advanced-concepts/
    screenshotIds:
      - accullm-kpis-dashboard
    status: live
    lastUpdated: 2026-03-05
  - slug: rank
    name: Rank
    summary: Average rank based on how early the tracked brand is mentioned relative to defined competitors.
    description: Only tracked competitors count toward ranking, and aggregate views average rank across engines unless an engine filter is applied.
    aliases: []
    sourceUrls:
      - https://www.accuranker.com/help/getting-started/accullm/
      - https://www.accuranker.com/help/getting-started/llm-metrics-and-advanced-concepts/
    screenshotIds:
      - accullm-kpis-dashboard
      - accullm-rank-widget
      - accullm-ranking-distribution-widget
    status: live
    lastUpdated: 2026-03-05
  - slug: mentions
    name: Mentions
    summary: Total number of times the brand is mentioned across tracked prompt responses.
    description: Multiple mentions can be recorded within a single prompt on a single engine.
    aliases:
      - Brand mentions
    sourceUrls:
      - https://www.accuranker.com/help/getting-started/accullm/
      - https://www.accuranker.com/help/getting-started/llm-metrics-and-advanced-concepts/
    screenshotIds:
      - accullm-kpis-dashboard
    status: live
    lastUpdated: 2026-03-05
  - slug: citations
    name: Citations
    summary: Total number of times the tracked domain is cited across prompt responses.
    description: One prompt on one engine can contribute multiple citations if the domain is cited more than once.
    aliases: []
    sourceUrls:
      - https://www.accuranker.com/help/getting-started/accullm/
      - https://www.accuranker.com/help/getting-started/llm-metrics-and-advanced-concepts/
    screenshotIds:
      - accullm-kpis-dashboard
      - accullm-sources-table
    status: live
    lastUpdated: 2026-03-05
  - slug: share-of-citations
    name: Share of Citations
    summary: Percentage of all filtered citations owned by the tracked domain.
    description: Designed for competitor comparison over time rather than raw citation totals alone.
    aliases: []
    sourceUrls:
      - https://www.accuranker.com/help/getting-started/accullm/
    screenshotIds:
      - accullm-share-of-citations-widget
    status: live
    lastUpdated: 2026-03-05
  - slug: share-of-brand-mentions
    name: Share of Brand Mentions
    summary: Percentage of all filtered brand mentions attributed to the tracked brand.
    description: Shows how often the brand is mentioned relative to competitors inside the selected prompt set.
    aliases: []
    sourceUrls:
      - https://www.accuranker.com/help/getting-started/accullm/
    screenshotIds:
      - accullm-share-of-brand-mentions-widget
    status: live
    lastUpdated: 2026-03-05
  - slug: web-search-rate
    name: Web Search Rate
    summary: Percentage of prompt responses where the engine performs a web search.
    description: A 50 percent web search rate means half of the tracked prompts used web results in their answers during the selected period.
    aliases: []
    sourceUrls:
      - https://www.accuranker.com/help/getting-started/accullm/
    screenshotIds:
      - accullm-web-search-rate-widget
    status: live
    lastUpdated: 2026-03-05
  - slug: top-proximity-score
    name: Top Proximity Score
    summary: Measures how early the first brand mention appears in a response, normalized by response length.
    description: Earlier mentions receive higher scores because the first brand appearance happens closer to the top of the response.
    aliases: []
    sourceUrls:
      - https://www.accuranker.com/help/getting-started/accullm/
    screenshotIds:
      - accullm-top-proximity-score-widget
    status: live
    lastUpdated: 2026-03-05
  - slug: winners-and-losers
    name: Winners and Losers
    summary: Highlights prompts with the largest increases or decreases in average rank across LLM engines.
    description: Intended to surface fast-moving prompt opportunities and regressions.
    aliases:
      - Top Winners and Losers
    sourceUrls:
      - https://www.accuranker.com/help/getting-started/accullm/
    screenshotIds:
      - accullm-winners-and-losers-widget
    status: live
    lastUpdated: 2026-03-05
  - slug: ranking-distribution
    name: Ranking Distribution
    summary: Distribution of tracked ranks grouped into bands such as 1 to 2, 3 to 6, 7 to 10, 11 to 50, and not ranking.
    description: Helps show how the overall quality of rankings changes over time, not just the average.
    aliases: []
    sourceUrls:
      - https://www.accuranker.com/help/getting-started/accullm/
    screenshotIds:
      - accullm-ranking-distribution-widget
    status: live
    lastUpdated: 2026-03-05
  - slug: sources
    name: Sources
    summary: Table of the domains cited most frequently in tracked responses.
    description: Used to analyze which websites are most often referenced by the selected engines and prompts.
    aliases: []
    sourceUrls:
      - https://www.accuranker.com/help/getting-started/accullm/
    screenshotIds:
      - accullm-sources-table
    status: live
    lastUpdated: 2026-03-05
  - slug: source-landing-pages
    name: Source Landing Pages
    summary: Lists the landing page URLs most frequently cited in tracked LLM responses.
    description: Also shows how many prompts cited each landing page so teams can identify the URLs earning the most AI citations.
    aliases: []
    sourceUrls:
      - https://www.accuranker.com/help/getting-started/accullm/
    screenshotIds:
      - accullm-source-landing-pages-table
    status: live
    lastUpdated: 2026-03-05
  - slug: top-brands
    name: Top Brands
    summary: Indicates which brand ranked first for each engine on a given prompt.
    description: Clicking through exposes the top five ranked brands per engine for that prompt.
    aliases: []
    sourceUrls:
      - https://www.accuranker.com/help/getting-started/llm-metrics-and-advanced-concepts/
    screenshotIds:
      - accullm-prompt-view
    status: live
    lastUpdated: 2026-03-05
  - slug: top-sources
    name: Top Sources
    summary: Indicates which source was cited first for each engine on a given prompt.
    description: The first cited source receives citation rank 1, and deeper views expose the top five cited sources per engine.
    aliases: []
    sourceUrls:
      - https://www.accuranker.com/help/getting-started/llm-metrics-and-advanced-concepts/
    screenshotIds:
      - accullm-prompt-view
      - accullm-sources-table
    status: live
    lastUpdated: 2026-03-05
  - slug: source-count
    name: Source Count
    summary: Number of unique sources used across the prompt responses in the aggregated prompt row.
    description: Engine-level counts do not necessarily sum to the aggregate because the same source can appear across multiple responses.
    aliases: []
    sourceUrls:
      - https://www.accuranker.com/help/getting-started/llm-metrics-and-advanced-concepts/
    screenshotIds:
      - accullm-prompt-view
    status: live
    lastUpdated: 2026-03-05
  - slug: brand-count
    name: Brand Count
    summary: Number of unique brands mentioned across the aggregated prompt responses.
    description: Brand counts can differ from simple mention totals because repeated mentions of the same brand are deduplicated.
    aliases: []
    sourceUrls:
      - https://www.accuranker.com/help/getting-started/llm-metrics-and-advanced-concepts/
    screenshotIds:
      - accullm-prompt-view
    status: live
    lastUpdated: 2026-03-05
  - slug: average-citation-rank
    name: Average Citation Rank
    summary: Average position at which a source is cited across prompts, where lower values mean earlier citation.
    description: This is source ranking, not brand ranking, and focuses strictly on citation order.
    aliases: []
    sourceUrls:
      - https://www.accuranker.com/help/getting-started/llm-metrics-and-advanced-concepts/
    screenshotIds:
      - accullm-sources-table
    status: live
    lastUpdated: 2026-03-05
  - slug: cited-rate
    name: Cited
    summary: Percentage of prompts in which a source is cited at least once.
    description: Calculated as unique prompts containing the source divided by the total number of prompts in scope.
    aliases:
      - Cited rate
    sourceUrls:
      - https://www.accuranker.com/help/getting-started/llm-metrics-and-advanced-concepts/
    screenshotIds:
      - accullm-sources-table
    status: live
    lastUpdated: 2026-03-05
