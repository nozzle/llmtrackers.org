      - author: Kimberly Ann
        title: I receive way too many cold calls from…
        rating: 1
        date: 2024-05-16T21:04:43.000Z
        excerpt: I receive way too many cold calls from Conductor to my personal cell phone. They call from numbers I don't know, then when I answer, they refuse to hear you say no. I have told them countless times I am not interested in their tool for the company I currently work at and they still call me almost monthly and even schedule meeting invites or reschedules without confirming a time for me. I will hear them out, then say no, they still push for another meeting, I cancel it, they throw another meeting on my calendar, etc. They are like a bad relationship you can't get out of even when you never started one. I've told them their costs are not in our budget at all, we have much larger projects that we need the budget for. I've told them they are not a fit at all for our business model and they refuse to listen. No other tool has ever done this to me and it is seriously a major turnoff for SEO Directors. Even if I could use them in the future perhaps for another agency or brand I wouldn't at this point. Stop calling my cell phone!!! Please take me off your call list.
        url: null
