name = "llm-tracker-form-worker"
main = "src/index.ts"
compatibility_date = "2025-03-06"

# Secrets (set via `wrangler secret put`):
#   GITHUB_APP_ID          - The GitHub App's numeric ID
#   GITHUB_APP_PRIVATE_KEY - The GitHub App's private key (PEM format)
#   GITHUB_INSTALLATION_ID - The installation ID for the nozzle/llm-tracker-comparison repo
#   ALLOWED_ORIGIN         - The exact origin allowed to make requests (e.g. https://llm-tracker.pages.dev)

[vars]
GITHUB_REPO_OWNER = "nozzle"
GITHUB_REPO_NAME = "llm-tracker-comparison"
