"$schema" = "node_modules/wrangler/config-schema.json"
name = "llmtrackers"
main = "src/server.ts"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]

[browser]
binding = "BROWSER"

[triggers]
crons = ["0 6 * * 1"]

[vars]
GITHUB_REPO_OWNER = "nozzle"
GITHUB_REPO_NAME = "llmtrackers.org"
VITE_SITE_URL = "https://llmtrackers.org"
TURNSTILE_SITE_KEY = "0x4AAAAAACnw5hLwb6J55OEk"

[[queues.producers]]
binding = "UPDATE_QUEUE"
queue = "update-jobs"

[[queues.consumers]]
queue = "update-jobs"
max_batch_size = 5
max_batch_timeout = 5

[observability]
enabled = true
